{% extends 'base.html' %}
{% block main %}
{% load static %}
{%include 'messages.html'%}
    <!-- End Header Mobile -->
    <!-- Navigation -->
    <section class="navigation">
      <div class="parallax parallax--nav-2">
        <div class="container clearfix">
          <div class="row">
            <div class="col-md-12">
              <h2>
                Contact
              </h2>
              <ul class="breadcrumbs ul--inline ul--no-style">
                <li>
                  <a href=" {% static 'index.html' %} ">Home</a>
                </li>
                <span>/</span>
                <li class="active">
                  Contact
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- End Navigation -->
    <!-- Contact content -->
    <section class="contact-content">
      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <div class="m-t-40">
              <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3672.326774484046!2d72.52064721135159!3d23.011771079094594!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e857b1e641f55%3A0x340942a1d8267e91!2sTitanium%20City%20Center%20-%20Corporate%20Offices!5e0!3m2!1sen!2sin!4v1735015488886!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-contact-wrap m-t-40">
              <h4>Send us a message</h4>
              <form class="form-contact js-contact-form" action="/contact" method="POST" role="form" name="contact">
                {%csrf_token%}
                <div class="row">
                  <div class="col-md-6 col-12">
                    <input type="text" name="name" required placeholder="Your Name*">
                  </div>
                  <div class="col-md-6 col-12">
                    <input type="email" name="email" placeholder="Your Email*" required>
                  </div>
                  <div class="col-md-6 col-12">
                    <input type="text" name="subject" required placeholder="Your Name*">
                  </div>
                  <div class="col-md-12">
                    <textarea name="message" id="message" class="message" placeholder="Your Message" value=""></textarea>
                  </div>
                </div>
                <div>
                  <button type="submit" class="au-btn au-btn--pill au-btn--yellow au-btn--big">Contact Us</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- End Contact Content -->
    <!-- Contact Info -->
    <section class="contact-info">
      <div class="container">
        <div class="row">
          <div class="col-lg-3 col-md-6">
            <h4 class="p-t-30">Contact info</h4>
          </div>
          <div class="col-lg-3 col-md-6">
            <div class="p-t-30">
              <i class="fa fa-home m-r-8"></i>
              25/A, Titanum City Center, Sivranjani, Ahemdabad
            </div>
          </div>
          <div class="col-lg-3 col-md-6">
            <div class="p-t-30">
              <i class="fa fa-phone m-r-8"></i>
              +91 87235 75679
            </div>
          </div>
          <div class="col-lg-3 col-md-6">
            <div class="p-t-30">
              <i class="fa fa-envelope m-r-8"></i>
              <a href="https://freebw.com/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="a2e1cdccd6c3c1d6e3d0c1cae2c5cfc3cbce8cc1cdcf">arch@gmail.com</a>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- End Contact Info -->
  {%endblock%}
